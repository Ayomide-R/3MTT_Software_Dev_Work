<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Recreation Assignment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <!-- Assignment 1 -->
        <section class="assignment assignment-1">
            <h2 class="assignment-title">Assignment 1</h2>
            <div class="assignment-content">
                <div class="btn btn-frameworks">FRAMEWORKS</div>
                <div class="btn btn-programming">Programming</div>
                <div class="btn btn-tech">Tech</div>
            </div>
        </section>

        <!-- Assignment 2 -->
        <section class="assignment assignment-2">
            <h2 class="assignment-title">Assignment 2</h2>
            <div class="assignment-content">
                <div class="diagonal-grid">
                    <div class="square q1"></div>
                    <div class="square q2"></div>
                    <div class="square q3"></div>
                    <div class="square q4"></div>
                    <div class="square q5"></div>
                    <div class="square q6"></div>
                    <div class="square q7"></div>
                    <div class="square q8"></div>
                    <div class="square q9"></div>
                    <div class="square q10"></div>
                </div>
            </div>
        </section>

        <!-- Assignment 3 -->
        <section class="assignment assignment-3">
            <h2 class="assignment-title">Assignment 3</h2>
            <div class="assignment-content">
                <div class="frame-outer">
                    <div class="frame-inner">
                        <div class="color-block block-top"></div>
                        <div class="color-block block-middle"></div>
                        <div class="color-block block-bottom"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Assignment 4 -->
        <section class="assignment assignment-4">
            <h2 class="assignment-title">Assignment 4</h2>
            <div class="assignment-content">
                <div class="pattern-container">
                    <div class="diamond-grid-pattern">
                        <div class="square s-red d-top"></div>
                        <div class="square s-blue d-mid-up-l"></div>
                        <div class="square s-blue d-mid-up-r"></div>
                        <div class="square s-black d-center-l"></div>
                        <div class="square s-black d-center-r"></div>
                        <div class="square s-blue d-mid-low-l"></div>
                        <div class="square s-blue d-mid-low-r"></div>
                        <div class="square s-red d-bottom"></div>
                    </div>
                    <div class="tail-grid-left">
                        <div class="square s-red tl-1"></div>
                        <div class="square s-blue tl-2"></div>
                        <div class="square s-black tl-3"></div>
                        <div class="square s-black tl-4"></div>
                    </div>
                </div>

                <div class="pattern-container">
                    <div class="diamond-grid-pattern">
                        <div class="square s-red d-top"></div>
                        <div class="square s-blue d-mid-up-l"></div>
                        <div class="square s-blue d-mid-up-r"></div>
                        <div class="square s-black d-center-l"></div>
                        <div class="square s-black d-center-r"></div>
                        <div class="square s-blue d-mid-low-l"></div>
                        <div class="square s-blue d-mid-low-r"></div>
                        <div class="square s-red d-bottom"></div>
                    </div>
                    <div class="tail-grid-right">
                        <div class="square s-red tr-1"></div>
                        <div class="square s-blue tr-2"></div>
                        <div class="square s-black tr-3"></div>
                        <div class="square s-black tr-4"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
